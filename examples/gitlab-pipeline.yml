# ──────────────────────────────────────────────────────────────────────────────
# Example: Minimal GitLab CI pipeline using ReleasePilot
# ──────────────────────────────────────────────────────────────────────────────
#
# Add this job to your .gitlab-ci.yml.
# Generates Markdown release notes when a tag is pushed.
#
# For more options, see: docs/gitlab-integration.md
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - release

release-notes:
  stage: release
  image: python:3.12-slim
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pip install --quiet "releasepilot[export] @ git+https://github.com/polprog-tech/ReleasePilot.git@main"
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      releasepilot export --audience changelog --version "$VERSION" -o RELEASE_NOTES.md
  artifacts:
    paths:
      - RELEASE_NOTES.md
    expire_in: 30 days
