<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="rocket-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="flame-outer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="flame-inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="128" y1="0" x2="128" y2="512" stroke="#fff" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#fff" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Orbital ring -->
  <ellipse cx="256" cy="248" rx="140" ry="40" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.25" transform="rotate(-20 256 248)"/>

  <!-- Rocket group -->
  <g transform="translate(256,248) rotate(-45)" filter="url(#shadow)">
    <!-- Rocket nose cone -->
    <path d="M0,-95 C12,-95 22,-70 22,-50 L-22,-50 C-22,-70 -12,-95 0,-95Z" fill="url(#rocket-body)"/>

    <!-- Rocket body -->
    <rect x="-22" y="-50" width="44" height="80" rx="2" fill="url(#rocket-body)"/>

    <!-- Body stripe -->
    <rect x="-22" y="-10" width="44" height="6" fill="url(#accent)" opacity="0.7"/>

    <!-- Window -->
    <circle cx="0" cy="-28" r="11" fill="#312e81" stroke="#a5b4fc" stroke-width="2"/>
    <circle cx="-3" cy="-31" r="3" fill="#818cf8" opacity="0.6"/>

    <!-- Fins -->
    <path d="M-22,10 L-42,50 L-22,36 Z" fill="#c7d2fe" opacity="0.85"/>
    <path d="M22,10 L42,50 L22,36 Z" fill="#c7d2fe" opacity="0.85"/>
    <path d="M-6,30 L0,55 L6,30 Z" fill="#c7d2fe" opacity="0.6"/>

    <!-- Nozzle -->
    <path d="M-14,30 L-18,42 L18,42 L14,30 Z" fill="#94a3b8"/>

    <!-- Flame outer -->
    <ellipse cx="0" cy="56" rx="14" ry="28" fill="url(#flame-outer)" opacity="0.9" filter="url(#glow)"/>
    <!-- Flame inner -->
    <ellipse cx="0" cy="52" rx="8" ry="18" fill="url(#flame-inner)" opacity="0.95"/>
    <!-- Flame core -->
    <ellipse cx="0" cy="48" rx="4" ry="10" fill="#fefce8" opacity="0.9"/>
  </g>

  <!-- Document icon (bottom-right) -->
  <g transform="translate(350, 340)" opacity="0.2">
    <rect x="0" y="0" width="44" height="56" rx="4" fill="#fff"/>
    <rect x="8" y="12" width="28" height="3" rx="1" fill="#6366f1"/>
    <rect x="8" y="20" width="22" height="3" rx="1" fill="#6366f1"/>
    <rect x="8" y="28" width="26" height="3" rx="1" fill="#6366f1"/>
    <rect x="8" y="36" width="18" height="3" rx="1" fill="#6366f1"/>
    <path d="M30,0 L44,14 L30,14 Z" fill="#a5b4fc"/>
  </g>

  <!-- Stars -->
  <circle cx="100" cy="100" r="2.5" fill="#e0e7ff" opacity="0.6"/>
  <circle cx="400" cy="80" r="2" fill="#e0e7ff" opacity="0.5"/>
  <circle cx="420" cy="180" r="1.5" fill="#e0e7ff" opacity="0.4"/>
  <circle cx="80" cy="350" r="2" fill="#e0e7ff" opacity="0.5"/>
  <circle cx="130" cy="420" r="1.5" fill="#e0e7ff" opacity="0.3"/>
  <circle cx="440" cy="400" r="2" fill="#e0e7ff" opacity="0.4"/>
  <circle cx="160" cy="160" r="1.5" fill="#e0e7ff" opacity="0.35"/>
  <circle cx="370" cy="130" r="1.8" fill="#e0e7ff" opacity="0.45"/>
</svg>
