<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="banner-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a2e"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="b-rocket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="b-flame-o" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="b-flame-i" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="b-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="b-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#banner-bg)"/>

  <!-- Grid -->
  <g opacity="0.03">
    <line x1="200" y1="0" x2="200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Stars -->
  <circle cx="80" cy="50" r="1.5" fill="#e0e7ff" opacity="0.5"/>
  <circle cx="180" cy="240" r="1.2" fill="#e0e7ff" opacity="0.3"/>
  <circle cx="320" cy="40" r="1.8" fill="#e0e7ff" opacity="0.4"/>
  <circle cx="900" cy="60" r="1.5" fill="#e0e7ff" opacity="0.5"/>
  <circle cx="1050" cy="230" r="1.3" fill="#e0e7ff" opacity="0.35"/>
  <circle cx="1130" cy="80" r="1.6" fill="#e0e7ff" opacity="0.4"/>
  <circle cx="750" cy="260" r="1.2" fill="#e0e7ff" opacity="0.3"/>

  <!-- Rocket (left side) -->
  <g transform="translate(150,150) rotate(-45) scale(0.65)">
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="100" ry="28" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.2" transform="rotate(25)"/>

    <!-- Nose cone -->
    <path d="M0,-80 C10,-80 18,-60 18,-42 L-18,-42 C-18,-60 -10,-80 0,-80Z" fill="url(#b-rocket)"/>
    <!-- Body -->
    <rect x="-18" y="-42" width="36" height="65" rx="2" fill="url(#b-rocket)"/>
    <!-- Stripe -->
    <rect x="-18" y="-8" width="36" height="5" fill="url(#b-accent)" opacity="0.7"/>
    <!-- Window -->
    <circle cx="0" cy="-24" r="9" fill="#312e81" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="-2" cy="-26" r="2.5" fill="#818cf8" opacity="0.6"/>
    <!-- Fins -->
    <path d="M-18,8 L-35,40 L-18,28 Z" fill="#c7d2fe" opacity="0.85"/>
    <path d="M18,8 L35,40 L18,28 Z" fill="#c7d2fe" opacity="0.85"/>
    <path d="M-5,23 L0,44 L5,23 Z" fill="#c7d2fe" opacity="0.6"/>
    <!-- Nozzle -->
    <path d="M-12,23 L-15,33 L15,33 L12,23 Z" fill="#94a3b8"/>
    <!-- Flames -->
    <ellipse cx="0" cy="46" rx="11" ry="22" fill="url(#b-flame-o)" opacity="0.9" filter="url(#b-glow)"/>
    <ellipse cx="0" cy="43" rx="6" ry="14" fill="url(#b-flame-i)" opacity="0.95"/>
    <ellipse cx="0" cy="40" rx="3" ry="8" fill="#fefce8" opacity="0.9"/>
  </g>

  <!-- Title text (true center of banner) -->
  <text x="600" y="128" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-1" text-anchor="middle">ReleasePilot</text>

  <!-- Tagline -->
  <text x="600" y="170" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#a5b4fc" font-weight="400" letter-spacing="0.5" text-anchor="middle">Polished, audience-aware release notes from your repository</text>

  <!-- Accent line under tagline -->
  <rect x="560" y="185" width="80" height="3" rx="1.5" fill="#6366f1" opacity="0.6"/>

  <!-- Feature pills (centered at x=600, total ~580px with 10px gaps) -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="500">
    <rect x="310" y="208" width="104" height="28" rx="14" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
    <text x="362" y="226" fill="#c7d2fe" text-anchor="middle">5 Audiences</text>

    <rect x="424" y="208" width="96" height="28" rx="14" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
    <text x="472" y="226" fill="#c7d2fe" text-anchor="middle">PDF · DOCX</text>

    <rect x="530" y="208" width="112" height="28" rx="14" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
    <text x="586" y="226" fill="#c7d2fe" text-anchor="middle">10 Languages</text>

    <rect x="652" y="208" width="102" height="28" rx="14" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
    <text x="703" y="226" fill="#c7d2fe" text-anchor="middle">Multi-Repo</text>

    <rect x="764" y="208" width="126" height="28" rx="14" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
    <text x="827" y="226" fill="#c7d2fe" text-anchor="middle">Executive Briefs</text>
  </g>
</svg>